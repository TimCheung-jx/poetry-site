<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim的诗集</title>
<meta name="description" content="Tim的个人诗集">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Caveat:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --navy:#2C4058;
  --orange:#E8834A;
  --green:#80A86E;
  --cream:#f5f2ed;
  --ink:#3A3A3A;
  --ink-light:#666;
  --ink-faint:#999;
  --white:#fefefe;
}

html{scroll-behavior:smooth;font-size:16px}

body{
  font-family:'Noto Sans SC',sans-serif;
  font-size:16px;line-height:1.7;
  color:var(--ink);
  background:var(--cream);
  -webkit-font-smoothing:antialiased;
}

::selection{background:var(--orange);color:#fff}

.container{max-width:1100px;margin:0 auto;padding:0 clamp(20px,4vw,40px)}

/* ===== HERO ===== */
.hero{
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:clamp(40px,6vw,80px) 24px;
  text-align:center;position:relative;
}
.hero-avatar{
  width:clamp(100px,16vw,140px);
  height:clamp(100px,16vw,140px);
  border-radius:50%;object-fit:cover;
  margin-bottom:clamp(24px,4vw,36px);
  border:3px solid var(--navy);
  box-shadow:0 4px 24px rgba(44,64,88,0.12);
}
.hero h1{
  font-family:'Noto Serif SC',serif;font-weight:900;
  font-size:clamp(2.4rem,6vw,4rem);
  color:var(--navy);letter-spacing:3px;
  margin-bottom:0.6rem;line-height:1.2;
}
.hero .subtitle{
  font-size:clamp(0.95rem,2vw,1.1rem);
  color:var(--ink-faint);font-weight:300;
  letter-spacing:2px;max-width:500px;
}
.hero .subtitle em{
  font-family:'Caveat',cursive;font-style:normal;
  color:var(--orange);font-size:1.2em;letter-spacing:0;
}

/* ===== TAG FILTER ===== */
.tag-bar{
  position:sticky;top:0;z-index:10;
  background:var(--cream);
  padding:clamp(16px,2vw,24px) 0;
  border-bottom:1px solid rgba(58,58,58,0.06);
  backdrop-filter:blur(8px);
}
.tag-inner{
  display:flex;gap:10px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.tag-inner::-webkit-scrollbar{display:none}

.tag-pill{
  flex-shrink:0;padding:7px 20px;border-radius:100px;
  font-size:0.85rem;font-weight:400;cursor:pointer;
  border:1.5px solid rgba(58,58,58,0.1);
  background:transparent;color:var(--ink-light);
  transition:all 0.25s;font-family:'Noto Sans SC',sans-serif;
  letter-spacing:0.5px;
}
.tag-pill:hover{border-color:var(--navy);color:var(--navy)}
.tag-pill.active{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:500}

/* ===== POEMS SECTION ===== */
.poems-section{padding:clamp(48px,8vh,80px) 0 clamp(80px,12vh,160px)}

.poem-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:clamp(20px,2.5vw,32px);
}

/* ===== POEM CARD ===== */
.poem-card{
  background:var(--white);
  border-radius:16px;
  padding:clamp(28px,3vw,40px);
  box-shadow:0 2px 16px rgba(0,0,0,0.04);
  transition:box-shadow 0.4s,transform 0.3s;
  cursor:pointer;
  display:flex;flex-direction:column;
  position:relative;
  overflow:hidden;
  /* Collapsed: show ~7 lines */
  max-height:420px;
  transition:max-height 0.5s cubic-bezier(0.4,0,0.2,1),
             grid-column 0.5s cubic-bezier(0.4,0,0.2,1),
             box-shadow 0.4s,
             padding 0.5s;
}
.poem-card:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 36px rgba(44,64,88,0.1);
}
.poem-card::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,var(--navy),var(--orange),var(--green));
  opacity:0;transition:opacity 0.3s;
}
.poem-card:hover::before{opacity:1}

/* EXPANDED STATE */
.poem-card.expanded{
  max-height:4000px;
  cursor:default;
  grid-column:1/-1;
  box-shadow:0 8px 40px rgba(44,64,88,0.1);
  padding:clamp(36px,5vw,60px);
}
.poem-card.expanded:hover{transform:none}
.poem-card.expanded::before{opacity:1}

.poem-card-img{
  width:calc(100% + clamp(56px,6vw,80px));
  margin:calc(-1*clamp(28px,3vw,40px));
  margin-bottom:clamp(20px,2vw,28px);
  height:180px;object-fit:cover;
  border-radius:16px 16px 0 0;
  transition:height 0.6s;
}
.poem-card.expanded .poem-card-img{
  width:calc(100% + clamp(72px,10vw,120px));
  margin:calc(-1*clamp(36px,5vw,60px));
  margin-bottom:clamp(28px,3vw,40px);
  height:300px;
  border-radius:16px 16px 0 0;
}

.poem-card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.poem-card-tag{
  font-size:0.7rem;padding:2px 10px;border-radius:100px;
  background:rgba(44,64,88,0.06);color:var(--navy);letter-spacing:0.5px;
}
.poem-card.expanded .poem-card-tag{font-size:0.78rem}

.poem-card-title{
  font-family:'Noto Serif SC',serif;font-weight:700;
  font-size:1.25rem;color:var(--navy);letter-spacing:1px;
  margin-bottom:4px;line-height:1.3;
  transition:font-size 0.4s;
}
.poem-card.expanded .poem-card-title{
  font-size:clamp(1.6rem,4vw,2.4rem);
  letter-spacing:2px;
}

.poem-card-date{font-size:0.75rem;color:var(--ink-faint);margin-bottom:14px}
.poem-card.expanded .poem-card-date{font-size:0.85rem;margin-bottom:24px}

.poem-card-text{
  font-size:0.9rem;line-height:1.9;color:var(--ink);
  white-space:pre-line;flex:1;
  overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:7;-webkit-box-orient:vertical;
  transition:font-size 0.4s,line-height 0.4s;
}
.poem-card.expanded .poem-card-text{
  display:block;-webkit-line-clamp:unset;
  font-size:clamp(1.05rem,2vw,1.2rem);
  line-height:2.3;
  overflow:visible;
  max-width:680px;
}

.poem-card-hint{
  position:absolute;bottom:clamp(28px,3vw,40px);right:clamp(28px,3vw,40px);
  font-family:'Caveat',cursive;font-size:0.8rem;color:var(--orange);
  opacity:0;transition:opacity 0.3s;pointer-events:none;
}
.poem-card:hover .poem-card-hint{opacity:0.55}
.poem-card.expanded .poem-card-hint{opacity:0}

.poem-card-collapse{
  display:none;
  margin-top:28px;padding-top:24px;
  border-top:1px solid rgba(58,58,58,0.06);
  justify-content:center;
  gap:16px;
  align-items:center;
}
.poem-card.expanded .poem-card-collapse{display:flex}

.poem-close-btn{
  font-size:0.85rem;color:var(--ink-light);cursor:pointer;
  padding:7px 20px;border-radius:8px;
  border:1.5px solid rgba(58,58,58,0.1);
  background:transparent;transition:all 0.2s;font-family:inherit;
}
.poem-close-btn:hover{border-color:var(--navy);color:var(--navy)}

/* ===== EMPTY STATE ===== */
.empty-state{grid-column:1/-1;text-align:center;padding:clamp(60px,10vh,100px) 0;color:var(--ink-faint)}
.empty-state .empty-icon{font-size:3rem;margin-bottom:16px;opacity:0.3}
.empty-state p{font-size:0.95rem;letter-spacing:1px}

/* ===== FOOTER ===== */
.footer{padding:clamp(48px,6vh,72px) 0;text-align:center;border-top:1px solid rgba(58,58,58,0.06)}
.footer-domain{font-family:'Caveat',cursive;font-size:1.2rem;color:var(--navy);letter-spacing:1px;margin-bottom:4px}
.footer-note{font-size:0.75rem;color:var(--ink-faint);letter-spacing:1px}
.footer-admin{display:inline-block;margin-top:12px;font-size:0.7rem;color:var(--ink-faint);opacity:0.4;transition:opacity 0.3s;text-decoration:none}
.footer-admin:hover{opacity:1;color:var(--navy)}

/* ===== SCROLL REVEAL ===== */
.reveal{opacity:0;transform:translateY(24px);transition:opacity 0.6s cubic-bezier(0.16,1,0.3,1),transform 0.6s cubic-bezier(0.16,1,0.3,1)}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-d1{transition-delay:0s}
.reveal-d2{transition-delay:.08s}
.reveal-d3{transition-delay:.16s}
.reveal-d4{transition-delay:.24s}
.reveal-d5{transition-delay:.32s}
.reveal-d6{transition-delay:.40s}
@media(prefers-reduced-motion){.reveal{opacity:1;transform:none;transition:none}}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .poem-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  html{font-size:15px}
  .hero{min-height:90vh}
}
</style>
</head>
<body>

<section class="hero">
  <img class="hero-avatar" src="assets/avatar.jpg" alt="Tim" onerror="this.style.display='none'">
  <h1>Tim 的诗集</h1>
  <p class="subtitle">写诗是让世界 <em>安静</em> 下来的方式</p>
</section>

<nav class="tag-bar" id="tagBar">
  <div class="container">
    <div class="tag-inner" id="tagInner">
      <button class="tag-pill active" data-tag="all">全部</button>
    </div>
  </div>
</nav>

<section class="poems-section">
  <div class="container">
    <div class="poem-grid" id="poemGrid">
      <div class="empty-state"><div class="empty-icon">✎</div><p>诗歌加载中...</p></div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="footer-domain">poetry.dpdns.org</div>
  <p class="footer-note">诗是自己写的 · 网站是AI搭的</p>
  <a href="admin.html" class="footer-admin">管理后台</a>
</footer>

<script>
let allPoems=[],activeTag='all',currentFiltered=[];

async function init(){
  try{
    const res=await fetch('poems.json');
    allPoems=await res.json();
    buildTags();renderPoems();
  }catch(e){
    document.getElementById('poemGrid').innerHTML='<div class="empty-state"><div class="empty-icon">✎</div><p>还没有诗歌</p></div>';
  }
}

function buildTags(){
  const tagSet=new Set();
  allPoems.forEach(p=>p.tags.forEach(t=>tagSet.add(t)));
  const tagInner=document.getElementById('tagInner');
  Array.from(tagSet).sort().forEach(tag=>{
    const btn=document.createElement('button');
    btn.className='tag-pill';btn.dataset.tag=tag;btn.textContent=tag;
    btn.addEventListener('click',()=>filterByTag(tag,btn));
    tagInner.appendChild(btn);
  });
  document.querySelector('[data-tag="all"]').addEventListener('click',function(){filterByTag('all',this)});
}

function filterByTag(tag,btn){
  activeTag=tag;
  document.querySelectorAll('.tag-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPoems();
}

function renderPoems(){
  const grid=document.getElementById('poemGrid');
  const filtered=activeTag==='all'?allPoems:allPoems.filter(p=>p.tags.includes(activeTag));
  currentFiltered=filtered;

  if(!filtered.length){
    grid.innerHTML='<div class="empty-state"><div class="empty-icon">🍃</div><p>这个标签下还没有诗歌</p></div>';
    return;
  }

  grid.innerHTML=filtered.map((p,i)=>{
    const delay='reveal-d'+(i%6+1);
    return `<article class="poem-card reveal ${delay}" data-idx="${i}">
      ${p.image?`<img class="poem-card-img" src="${p.image}" alt="" loading="lazy">`:''}
      <div class="poem-card-tags">${p.tags.map(t=>`<span class="poem-card-tag">${t}</span>`).join('')}</div>
      <h2 class="poem-card-title">${p.title}</h2>
      <time class="poem-card-date">${p.date}</time>
      <div class="poem-card-text">${p.poem}</div>
      <span class="poem-card-hint">点击展开</span>
      <div class="poem-card-collapse">
        <button class="poem-close-btn">收起 ↑</button>
      </div>
    </article>`;
  }).join('');

  // Card click: expand / collapse
  grid.querySelectorAll('.poem-card').forEach(card=>{
    card.addEventListener('click',function(e){
      if(e.target.closest('.poem-close-btn')) return;
      if(card.classList.contains('expanded')){
        // Collapse: lock current height, then shrink
        card.style.maxHeight=card.scrollHeight+'px';
        requestAnimationFrame(()=>{
          card.classList.remove('expanded');
          card.style.maxHeight='420px';
          card.scrollIntoView({behavior:'smooth',block:'nearest'});
        });
      }else{
        // Collapse any others
        grid.querySelectorAll('.poem-card.expanded').forEach(c=>{
          c.style.maxHeight=c.scrollHeight+'px';
          requestAnimationFrame(()=>{
            c.classList.remove('expanded');
            c.style.maxHeight='420px';
          });
        });
        // Expand: measure and grow
        card.classList.add('expanded');
        card.style.maxHeight=card.scrollHeight+'px';
        setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
      }
    });
    // Collapse button
    const closeBtn=card.querySelector('.poem-close-btn');
    if(closeBtn){
      closeBtn.addEventListener('click',function(e){
        e.stopPropagation();
        card.style.maxHeight=card.scrollHeight+'px';
        requestAnimationFrame(()=>{
          card.classList.remove('expanded');
          card.style.maxHeight='420px';
          card.scrollIntoView({behavior:'smooth',block:'nearest'});
        });
      });
    }
  });

  requestAnimationFrame(()=>{
    document.querySelectorAll('.reveal').forEach(el=>el.classList.add('visible'));
  });
}

// Keyboard Esc to collapse
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.querySelectorAll('.poem-card.expanded').forEach(c=>{
      c.style.maxHeight=c.scrollHeight+'px';
      requestAnimationFrame(()=>{
        c.classList.remove('expanded');
        c.style.maxHeight='420px';
      });
    });
  }
});

init();
</script>
</body>
</html>
